name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:latest
          build-args: |
            VITE_GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:latest
          cache-to: type=inline

      - name: Stop old revisions before deploy
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Ensure single-revision mode so Azure won't spin up a second replica.
            az containerapp revision set-mode \
              --name pokemon-draft \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --mode single

            # Explicitly deactivate every currently-active revision so the old
            # container releases its SQLite file lock on Azure Files before the
            # new container starts. Without this, Azure starts the new container
            # while the old one is still alive, causing a SQLite "database is
            # locked" deadlock (new container blocks on schema init → never
            # answers the health probe → Azure never kills the old container).
            REVISIONS=$(az containerapp revision list \
              --name pokemon-draft \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --query "[?properties.active].name" \
              --output tsv 2>/dev/null || true)

            for rev in $REVISIONS; do
              echo "Deactivating revision: $rev"
              az containerapp revision deactivate \
                --name pokemon-draft \
                --resource-group ${{ secrets.RESOURCE_GROUP }} \
                --revision "$rev" || true
            done

            # Give Azure Files a moment to release SMB file locks after the
            # old container exits.
            sleep 10

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          containerAppName: pokemon-draft
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_NAME }}.azurecr.io
          registryUsername: ${{ secrets.ACR_NAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
