name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:latest

      - name: Deploy to Container Apps
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:${{ github.sha }}"
          sed -e "s|IMAGE_TAG|$IMAGE|g" \
              -e "s|REGISTRY_SERVER|${{ secrets.ACR_NAME }}.azurecr.io|g" \
              -e "s|REGISTRY_USERNAME|${{ secrets.ACR_NAME }}|g" \
              -e "s|REGISTRY_PASSWORD|${{ secrets.ACR_PASSWORD }}|g" \
              containerapp.yaml > containerapp-deploy.yaml
          az containerapp update \
            --name pokemon-draft \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --yaml containerapp-deploy.yaml
