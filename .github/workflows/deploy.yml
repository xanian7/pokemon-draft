name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image to ACR
        uses: azure/acr-build@v1
        with:
          registry: ${{ secrets.ACR_NAME }}
          image: pokemon-draft:${{ github.sha }}
          dockerfile: Dockerfile

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          containerAppName: pokemon-draft
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/pokemon-draft:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_NAME }}.azurecr.io
          registryUsername: ${{ secrets.ACR_NAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
