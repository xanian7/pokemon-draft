# fly.toml — Fly.io deployment configuration
# Replace "pokemon-draft-app" with your unique app name (fly apps create <name>)
app = "pokemon-draft-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  # SQLite database stored on the persistent volume mounted at /data
  ConnectionStrings__DefaultConnection = "Data Source=/data/draft.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

# Persistent volume for SQLite — create with: fly volumes create pokemon_draft_data --size 1
[[mounts]]
  source = "pokemon_draft_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
